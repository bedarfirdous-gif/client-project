# ============================================
# BijnisBooks - Production Docker Compose Override
# ============================================
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # ============================================
  # MongoDB - Production Settings
  # ============================================
  mongodb:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "/ecs/bijnisbooks"
        awslogs-region: "${AWS_REGION:-us-east-1}"
        awslogs-stream-prefix: "mongodb"

  # ============================================
  # Backend - Production Settings
  # ============================================
  backend:
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "/ecs/bijnisbooks"
        awslogs-region: "${AWS_REGION:-us-east-1}"
        awslogs-stream-prefix: "backend"

  # ============================================
  # Frontend - Production Settings
  # ============================================
  frontend:
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    logging:
      driver: "awslogs"
      options:
        awslogs-group: "/ecs/bijnisbooks"
        awslogs-region: "${AWS_REGION:-us-east-1}"
        awslogs-stream-prefix: "frontend"
